<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SimpleSite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f17;
      --panel: #121823;
      --panel-2: #0f141f;
      --ink: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --ring: rgba(56, 189, 248, 0.35);
      --border: rgba(148, 163, 184, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 45%),
        radial-gradient(circle at 20% 20%, rgba(30, 41, 59, 0.6), transparent 40%),
        #0b0f17;
      min-height: 100vh;
      display: flex;
    }

    .app {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      animation: rise 0.35s ease-out;
    }

    @keyframes rise {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .key-row {
      display: grid;
      gap: 8px;
      flex: 1 1 280px;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    input[type="password"],
    input[type="text"],
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: var(--panel-2);
      color: var(--ink);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      cursor: pointer;
    }

    .toggle-text {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .toggle-shell {
      position: relative;
      width: 46px;
      height: 26px;
      flex-shrink: 0;
    }

    .toggle-input {
      position: absolute;
      inset: 0;
      margin: 0;
      opacity: 0;
      cursor: pointer;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #0c121c;
      border: 1px solid var(--border);
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .toggle-track::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #e5e7eb;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.35);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .toggle-input:checked + .toggle-track {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      border-color: var(--accent-2);
    }

    .toggle-input:checked + .toggle-track::after {
      transform: translateX(20px);
      background: #0b0f17;
    }

    .toggle-input:focus-visible + .toggle-track {
      box-shadow: 0 0 0 3px var(--ring);
    }

    .toggle-input:disabled + .toggle-track {
      opacity: 0.6;
      cursor: not-allowed;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--ring);
    }

    .messages {
      flex: 1;
      min-height: 260px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
      background: transparent;
      border-radius: 16px;
    }

    .messages::before,
    .messages::after {
      content: '';
      display: block;
      height: 16px;
    }

    .bubble {
      max-width: 80%;
      line-height: 1.85;
      animation: fade 0.2s ease-out;
      white-space: pre-wrap;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bubble.user {
      align-self: flex-end;
      background: #2b2b2b;
      border-radius: 18px;
      padding: 8px 12px;
      max-width: 75%;
    }

    .bubble.assistant {
      align-self: flex-start;
      color: #e5e7eb;
      max-width: 100%;
    }

    .composer-shell {
      position: sticky;
      bottom: 0;
      padding: 16px 24px 20px;
      background: linear-gradient(to top, rgba(11, 15, 23, 0.9), rgba(11, 15, 23, 0));
    }

    form {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    textarea {
      min-height: 44px;
      max-height: 180px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 600;
      background: #2b2b2b;
      border: 1px solid rgba(148, 163, 184, 0.35);
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
      box-shadow: none;
    }

    button:not(:disabled):hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.35);
    }

    .status {
      color: var(--muted);
      font-size: 0.85rem;
      min-height: 1.2em;
    }

    .console-btn {
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.4);
      color: var(--ink);
    }

    #consoleOverlay,
    #settingsOverlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(3, 7, 18, 0.75);
      padding: 20px;
      z-index: 50;
    }

    #consoleOverlay.open,
    #settingsOverlay.open {
      display: flex;
    }

    .console-window {
      width: min(920px, 100%);
      max-height: 85vh;
      background: #0b0f17;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      padding: 16px;
      display: grid;
      gap: 12px;
      box-shadow: 0 30px 70px rgba(2, 6, 23, 0.75);
    }

    .console-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .console-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .console-tab {
      border-radius: 999px;
      padding: 6px 12px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
    }

    .console-tab[data-active="true"] {
      color: var(--ink);
      border-color: rgba(56, 189, 248, 0.5);
      background: rgba(56, 189, 248, 0.12);
    }

    .console-pre {
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: #0a0e16;
      padding: 14px;
      font-size: 0.85rem;
      line-height: 1.6;
      overflow: auto;
      max-height: 60vh;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .composer-controls {
      display: flex;
      flex: 1;
      gap: 10px;
      align-items: center;
    }

    .composer-input {
      flex: 1;
      background: #2b2b2b;
      border: 1px solid #374151;
      color: #e5e7eb;
      border-radius: 12px;
      padding: 10px 14px;
      resize: none;
    }

    .composer-input::placeholder {
      color: #6b7280;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 999px;
      background: #2b2b2b;
      border: 1px solid #374151;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: #e5e7eb;
    }

    .chat-container {
      flex: 1;
      width: min(900px, 100%);
      display: flex;
      flex-direction: column;
      margin: 0 auto;
    }

    .floating-actions {
      position: fixed;
      right: 20px;
      bottom: 92px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 40;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="chat-container">
      <div id="messages" class="messages" aria-live="polite"></div>

      <div class="composer-shell">
        <form id="chatForm">
          <div class="composer-controls">
            <textarea id="prompt" class="composer-input" placeholder="Type your message..." required></textarea>
            <button id="sendBtn" class="send-btn" type="submit" aria-label="Send message">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4l-6 6h4v8h4v-8h4z" />
              </svg>
            </button>
          </div>
        </form>
        <div id="status" class="status"></div>
      </div>
    </div>
  </div>

  <div class="floating-actions" aria-label="Quick actions">
    <button id="settingsToggle" class="console-btn" type="button">Settings</button>
    <button id="consoleToggle" class="console-btn" type="button">Console</button>
  </div>

  <div id="settingsOverlay" aria-hidden="true">
    <div class="console-window" role="dialog" aria-modal="true" aria-labelledby="settingsTitle" tabindex="-1">
      <div class="console-header">
        <h3 id="settingsTitle">Settings</h3>
        <button id="settingsClose" class="console-btn" type="button">Close</button>
      </div>
      <div class="key-row">
        <label for="modelSelect">Model</label>
        <select id="modelSelect">
          <optgroup label="Google">
            <option value="gemini-3-flash-preview" data-provider="google">Gemini 3 Flash</option>
            <option value="gemini-3-pro-preview" data-provider="google">Gemini 3 Pro</option>
          </optgroup>
          <optgroup label="Anthropic">
            <option value="claude-opus-4-6" data-provider="anthropic" data-model-id="global.anthropic.claude-opus-4-6-v1">Claude Opus 4.6</option>
            <option value="claude-sonnet-4-5-20250929" data-provider="anthropic" data-model-id="global.anthropic.claude-sonnet-4-5-20250929-v1:0">Claude Sonnet 4.5</option>
            <option value="claude-haiku-4-5-20251001" data-provider="anthropic" data-model-id="global.anthropic.claude-haiku-4-5-20251001-v1:0">Claude Haiku 4.5</option>
            <option value="claude-opus-4-5-20251101" data-provider="anthropic" data-model-id="global.anthropic.claude-opus-4-5-20251101-v1:0">Claude Opus 4.5</option>
          </optgroup>
        </select>
        <label class="toggle-row" for="streamingToggle">
          <span class="toggle-text">Streaming</span>
          <span class="toggle-shell">
            <input id="streamingToggle" class="toggle-input" type="checkbox" />
            <span class="toggle-track" aria-hidden="true"></span>
          </span>
        </label>
        <label for="googleApiKey">Google API key</label>
        <input id="googleApiKey" type="password" placeholder="AIza..." autocomplete="off" />
      </div>
    </div>
  </div>

  <div id="consoleOverlay" aria-hidden="true">
    <div class="console-window" role="dialog" aria-modal="true" aria-labelledby="consoleTitle" tabindex="-1">
      <div class="console-header">
        <h3 id="consoleTitle">Console</h3>
        <button id="consoleClose" class="console-btn" type="button">Close</button>
      </div>
      <div class="console-tabs">
        <button id="consoleViewRequest" class="console-tab" type="button" data-active="true">Request</button>
        <button id="consoleViewResponse" class="console-tab" type="button" data-active="false">Response</button>
      </div>
      <pre id="consolePayload" class="console-pre">No requests yet.</pre>
    </div>
  </div>

  <script>
    (function() {
      const PAID_WORKER_ENDPOINT = "";
      const PAID_USER_ID = "";
      const MODEL_KEY = "simpletavern.simpleSite.model";
      const GOOGLE_API_KEY = "simpletavern.simpleSite.googleApiKey";
      const STREAMING_KEY = "simpletavern.simpleSite.streaming";

      const messages = document.getElementById("messages");
      const form = document.getElementById("chatForm");
      const promptInput = document.getElementById("prompt");
      const sendBtn = document.getElementById("sendBtn");
      const status = document.getElementById("status");
      const modelSelect = document.getElementById("modelSelect");
      const consoleToggle = document.getElementById("consoleToggle");
      const consoleOverlay = document.getElementById("consoleOverlay");
      const consoleClose = document.getElementById("consoleClose");
      const consolePayload = document.getElementById("consolePayload");
      const consoleViewRequest = document.getElementById("consoleViewRequest");
      const consoleViewResponse = document.getElementById("consoleViewResponse");
      const settingsToggle = document.getElementById("settingsToggle");
      const settingsOverlay = document.getElementById("settingsOverlay");
      const settingsClose = document.getElementById("settingsClose");
      const googleApiKeyInput = document.getElementById("googleApiKey");
      const streamingToggle = document.getElementById("streamingToggle");

      const history = [];
      let consoleView = "request";
      let lastRequestText = "";
      let lastResponseText = "";

      const storedModel = localStorage.getItem(MODEL_KEY);
      if (storedModel && modelSelect) {
        modelSelect.value = storedModel;
      }

      const storedGoogleApiKey = localStorage.getItem(GOOGLE_API_KEY);
      if (storedGoogleApiKey && googleApiKeyInput) {
        googleApiKeyInput.value = storedGoogleApiKey;
      }

      if (streamingToggle) {
        const storedStreaming = localStorage.getItem(STREAMING_KEY);
        streamingToggle.checked = storedStreaming === "true";
      }

      if (modelSelect) {
        modelSelect.addEventListener("change", () => {
          localStorage.setItem(MODEL_KEY, modelSelect.value);
        });
      }

      if (streamingToggle) {
        streamingToggle.addEventListener("change", () => {
          localStorage.setItem(STREAMING_KEY, streamingToggle.checked ? "true" : "false");
        });
      }

      if (googleApiKeyInput) {
        googleApiKeyInput.addEventListener("input", () => {
          localStorage.setItem(GOOGLE_API_KEY, googleApiKeyInput.value);
        });
      }

      function setStatus(text) {
        status.textContent = text || "";
      }

      function setBusy(isBusy) {
        sendBtn.disabled = isBusy;
        promptInput.disabled = isBusy;
        if (modelSelect) {
          modelSelect.disabled = isBusy;
        }
        if (googleApiKeyInput) {
          googleApiKeyInput.disabled = isBusy;
        }
        if (streamingToggle) {
          streamingToggle.disabled = isBusy;
        }
        if (consoleToggle) {
          consoleToggle.disabled = isBusy;
        }
        if (settingsToggle) {
          settingsToggle.disabled = isBusy;
        }
      }

      function appendMessage(role, text) {
        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        bubble.textContent = text;
        messages.appendChild(bubble);
        messages.scrollTop = messages.scrollHeight;
        return bubble;
      }

      function getSelectedModelConfig() {
        if (!modelSelect || modelSelect.selectedIndex < 0) return null;
        const option = modelSelect.options[modelSelect.selectedIndex];
        return {
          value: option.value,
          provider: option.dataset.provider || "google",
          modelId: option.dataset.modelId || ""
        };
      }

      function buildGooglePayload(items) {
        return {
          contents: items.map((entry) => ({
            role: entry.role === "assistant" ? "model" : "user",
            parts: [{ text: entry.text }]
          }))
        };
      }

      function buildBedrockMessages(items) {
        return items.map((entry) => ({
          role: entry.role === "assistant" ? "assistant" : "user",
          content: [{ text: entry.text }]
        }));
      }

      async function extractGoogleError(response) {
        const text = await response.text();
        if (!text) return "Google request failed.";
        try {
          const parsed = JSON.parse(text);
          return parsed?.error?.message || parsed?.error || parsed?.message || text;
        } catch (_) {
          return text;
        }
      }

      async function readGoogleStream(response, { onStreamDelta } = {}) {
        if (!response.ok) {
          throw new Error(await extractGoogleError(response));
        }
        if (!response.body || typeof response.body.getReader !== "function") {
          throw new Error("Streaming is not supported in this browser.");
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        let accumulated = "";

        const handleChunkPayload = (payload) => {
          if (!payload || typeof payload !== "object") return;
          const parts = payload?.candidates?.[0]?.content?.parts;
          if (Array.isArray(parts)) {
            const chunkText = parts
              .map((part) => (part && typeof part.text === "string" ? part.text : ""))
              .filter(Boolean)
              .join("");
            if (chunkText) {
              accumulated += chunkText;
              if (typeof onStreamDelta === "function") {
                onStreamDelta(accumulated);
              }
            }
          }
        };

        const processLine = (line) => {
          const trimmed = line.trim();
          if (!trimmed) return;
          if (trimmed.startsWith("data:")) {
            const raw = trimmed.slice(5).trim();
            if (!raw || raw === "[DONE]") return;
            try {
              const payload = JSON.parse(raw);
              handleChunkPayload(payload);
            } catch (_) {
              // Ignore malformed chunks.
            }
            return;
          }
          if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
            try {
              const payload = JSON.parse(trimmed);
              handleChunkPayload(payload);
            } catch (_) {
              // Ignore malformed chunks.
            }
          }
        };

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          let lineBreakIndex;
          while ((lineBreakIndex = buffer.indexOf("\n")) !== -1) {
            const line = buffer.slice(0, lineBreakIndex);
            buffer = buffer.slice(lineBreakIndex + 1);
            processLine(line);
          }
        }

        if (buffer.trim()) {
          buffer.split("\n").forEach((line) => processLine(line));
        }

        return { text: accumulated.trim() };
      }

      async function readBedrockStream(response, { onStreamDelta } = {}) {
        if (!response.ok) {
          const text = await response.text();
          let message = text || `Paid mode request failed with status ${response.status}.`;
          try {
            const parsed = JSON.parse(text);
            message = parsed?.error || parsed?.message || parsed?.body || message;
          } catch (_) {
            // Ignore parse errors.
          }
          throw new Error(message);
        }
        if (!response.body || typeof response.body.getReader !== "function") {
          throw new Error("Streaming is not supported in this browser.");
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        let accumulated = "";

        const handlePayload = (payload) => {
          if (!payload || typeof payload !== "object") return;
          if (payload.type === "error") {
            throw new Error(payload.error?.message || "Bedrock streaming error.");
          }
          const hasDeltaType =
            payload.type === "content_block_delta"
            || payload.type === "contentBlockDelta"
            || typeof payload.contentBlockDelta === "object"
            || typeof payload.content_block_delta === "object";
          if (!hasDeltaType) {
            return;
          }
          const delta =
            payload.delta
            || (payload.contentBlockDelta && payload.contentBlockDelta.delta)
            || (payload.content_block_delta && payload.content_block_delta.delta);
          if (!delta || typeof delta !== "object") return;
          const deltaType = delta.type || delta.deltaType;
          const textChunk =
            deltaType === "text_delta"
              ? delta.text || ""
              : typeof delta.text === "string"
                ? delta.text
                : "";
          if (!textChunk) return;
          accumulated += textChunk;
          if (typeof onStreamDelta === "function") {
            onStreamDelta(accumulated);
          }
        };

        const processLine = (line) => {
          const trimmed = line.trim();
          if (!trimmed || trimmed.startsWith(":")) return;
          if (!trimmed.startsWith("data:")) return;
          const raw = trimmed.slice(5).trim();
          if (!raw || raw === "[DONE]") return;
          try {
            const payload = JSON.parse(raw);
            handlePayload(payload);
          } catch (_) {
            // Ignore malformed chunks.
          }
        };

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split(/\r?\n/);
          buffer = lines.pop() || "";
          lines.forEach((line) => processLine(line));
        }

        if (buffer) {
          buffer.split(/\r?\n/).forEach((line) => processLine(line));
        }

        return { text: accumulated.trim() };
      }

      function formatJsonText(value) {
        if (!value) return "";
        try {
          const parsed = JSON.parse(value);
          return JSON.stringify(parsed, null, 2);
        } catch (_) {
          return value;
        }
      }

      function updateConsolePayload() {
        if (!consolePayload) return;
        const content = consoleView === "response" ? lastResponseText : lastRequestText;
        consolePayload.textContent = content || "No requests yet.";
      }

      function setConsoleView(nextView) {
        consoleView = nextView;
        if (consoleViewRequest) {
          consoleViewRequest.dataset.active = consoleView === "request" ? "true" : "false";
        }
        if (consoleViewResponse) {
          consoleViewResponse.dataset.active = consoleView === "response" ? "true" : "false";
        }
        updateConsolePayload();
      }

      function openConsole() {
        if (!consoleOverlay) return;
        consoleOverlay.classList.add("open");
        consoleOverlay.setAttribute("aria-hidden", "false");
        updateConsolePayload();
      }

      function closeConsole() {
        if (!consoleOverlay) return;
        consoleOverlay.classList.remove("open");
        consoleOverlay.setAttribute("aria-hidden", "true");
      }

      if (consoleToggle) {
        consoleToggle.addEventListener("click", openConsole);
      }
      if (consoleClose) {
        consoleClose.addEventListener("click", closeConsole);
      }
      if (consoleOverlay) {
        consoleOverlay.addEventListener("click", (event) => {
          if (event.target === consoleOverlay) {
            closeConsole();
          }
        });
      }
      if (consoleViewRequest) {
        consoleViewRequest.addEventListener("click", () => setConsoleView("request"));
      }
      if (consoleViewResponse) {
        consoleViewResponse.addEventListener("click", () => setConsoleView("response"));
      }

      function openSettings() {
        if (!settingsOverlay) return;
        settingsOverlay.classList.add("open");
        settingsOverlay.setAttribute("aria-hidden", "false");
      }

      function closeSettings() {
        if (!settingsOverlay) return;
        settingsOverlay.classList.remove("open");
        settingsOverlay.setAttribute("aria-hidden", "true");
      }

      if (settingsToggle) {
        settingsToggle.addEventListener("click", openSettings);
      }
      if (settingsClose) {
        settingsClose.addEventListener("click", closeSettings);
      }
      if (settingsOverlay) {
        settingsOverlay.addEventListener("click", (event) => {
          if (event.target === settingsOverlay) {
            closeSettings();
          }
        });
      }

      async function sendMessage(text) {
        setStatus("Thinking...");
        setBusy(true);

        history.push({ role: "user", text });
        const useStreaming = streamingToggle ? streamingToggle.checked : false;
        let streamingBubble = null;
        if (useStreaming) {
          streamingBubble = appendMessage("assistant", "");
        }

        try {
          const modelConfig = getSelectedModelConfig();
          if (!modelConfig) {
            throw new Error("Select a model first.");
          }

          let response;
          let requestBody;
          if (modelConfig.provider === "anthropic") {
            if (!modelConfig.modelId) {
              throw new Error("Missing Anthropic model mapping.");
            }
            requestBody = {
              userId: PAID_USER_ID,
              modelId: modelConfig.modelId,
              messages: buildBedrockMessages(history),
              inferenceConfig: { maxTokens: 1024, temperature: 0.7 },
              stream: useStreaming
            };
            lastRequestText = JSON.stringify(requestBody, null, 2);
            response = await fetch(`${PAID_WORKER_ENDPOINT}/chat`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(requestBody)
            });
          } else {
            const payload = buildGooglePayload(history);
            const apiKey = googleApiKeyInput ? googleApiKeyInput.value.trim() : "";
            if (!apiKey) {
              throw new Error("Google API key is missing. Add it in Settings.");
            }
            lastRequestText = JSON.stringify(payload, null, 2);
            const googleEndpoint = useStreaming
              ? `https://generativelanguage.googleapis.com/v1beta/models/${modelConfig.value}:streamGenerateContent?alt=sse`
              : `https://generativelanguage.googleapis.com/v1beta/models/${modelConfig.value}:generateContent`;
            response = await fetch(googleEndpoint, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-goog-api-key": apiKey
              },
              body: JSON.stringify(payload)
            });
          }

          let reply = "";
          if (modelConfig.provider === "anthropic") {
            if (useStreaming) {
              const streamResult = await readBedrockStream(response, {
                onStreamDelta: (value) => {
                  if (streamingBubble) {
                    streamingBubble.textContent = value;
                    messages.scrollTop = messages.scrollHeight;
                  }
                }
              });
              reply = streamResult.text;
            } else {
              const responseText = await response.text();
              lastResponseText = formatJsonText(responseText);
              let data = null;
              try {
                data = JSON.parse(responseText);
              } catch (_) {
                data = null;
              }
              if (!response.ok) {
                throw new Error(data?.error?.message || data?.error || responseText || "Request failed.");
              }
              const blocks = data?.output?.message?.content || [];
              reply = blocks.map((block) => block?.text || "").join("").trim();
            }
          } else {
            if (useStreaming) {
              const streamResult = await readGoogleStream(response, {
                onStreamDelta: (value) => {
                  if (streamingBubble) {
                    streamingBubble.textContent = value;
                    messages.scrollTop = messages.scrollHeight;
                  }
                }
              });
              reply = streamResult.text;
            } else {
              const responseText = await response.text();
              lastResponseText = formatJsonText(responseText);
              let data = null;
              try {
                data = JSON.parse(responseText);
              } catch (_) {
                data = null;
              }
              if (!response.ok) {
                throw new Error(data?.error?.message || data?.error || responseText || "Request failed.");
              }
              const parts = data?.candidates?.[0]?.content?.parts || [];
              reply = parts.map((part) => part?.text || "").join("").trim();
            }
          }
          if (!reply) {
            throw new Error("No response text returned.");
          }

          if (useStreaming) {
            if (streamingBubble) {
              streamingBubble.textContent = reply;
              messages.scrollTop = messages.scrollHeight;
            }
            lastResponseText = reply;
          } else {
            appendMessage("assistant", reply);
          }
          history.push({ role: "assistant", text: reply });
          setStatus("");
        } catch (error) {
          history.pop();
          if (streamingBubble) {
            streamingBubble.remove();
          }
          setStatus(error?.message || "Something went wrong.");
        } finally {
          setBusy(false);
          promptInput.focus();
        }
      }

      promptInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          form.requestSubmit();
        }
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = promptInput.value.trim();
        if (!text) return;
        appendMessage("user", text);
        promptInput.value = "";
        sendMessage(text);
      });
    })();
  </script>
</body>
</html>
